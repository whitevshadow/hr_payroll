server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Proxy API calls to the gateway on the compose network. The browser talks
    # to this same origin (/api/v1/...), so the built bundle never hard-codes the
    # gateway address and works on any host it is served from.
    location /api/ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Server-Sent Events (/api/v1/events/stream) must stream, not buffer.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: any unmatched path serves index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html so deployments take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
